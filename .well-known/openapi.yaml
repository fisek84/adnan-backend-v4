openapi: "3.0.3"
info:
  title: "Adnan Backend API"
  version: "1.0.0"
  description: "OpenAPI schema for Evolia Backend."

servers:
  - url: "https://adnan-backend-v4.onrender.com"
    description: "Production server"

paths:

  /tasks/all:
    get:
      summary: Get all tasks
      tags: [Tasks]
      responses:
        "200":
          description: All tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResponse"

  /tasks/create:
    post:
      summary: Create a task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "200":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /tasks/batch:
    post:
      summary: Create multiple tasks
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TaskCreate"
      responses:
        "200":
          description: Batch created tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskResponse"

  /tasks/{task_id}:
    patch:
      summary: Update a task
      tags: [Tasks]
      parameters:
        - in: path
          name: task_id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

    delete:
      summary: Delete a task
      tags: [Tasks]
      parameters:
        - in: path
          name: task_id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Deleted task

  ######################################################################
  # NEW: AI OPS ROUTE
  ######################################################################
  /ai-ops/run:
    post:
      summary: Run natural language Notion Ops command
      tags: [AI Ops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        "200":
          description: AI Ops result

  ######################################################################
  # NEW: NOTION OPS ROUTES
  ######################################################################
  /ext/notion-ops/execute:
    post:
      summary: Execute structured Notion Ops command
      tags: [Notion Ops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                payload:
                  type: object
      responses:
        "200":
          description: Execution result

  /ext/notion-ops/structure-check:
    post:
      summary: Validate structure of Notion database
      tags: [Notion Ops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                db_key:
                  type: string
                expected_properties:
                  type: object
      responses:
        "200":
          description: Structure validation result

######################################################################
# COMPONENTS — MUST BE LAST BLOCK
######################################################################
components:
  schemas:

    TaskCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        priority:
          type: string
          nullable: true
        goal:
          type: array
          items:
            type: string

    TaskUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date
          nullable: true

    TaskResponse:
      type: object
      properties:
        id:
          type: string
        notion_id:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date
          nullable: true
        goal:
          type: array
          items:
            type: string

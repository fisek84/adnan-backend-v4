openapi: "3.0.3"
info:
  title: "Adnan Backend API"
  version: "1.0.0"
  description: "OpenAPI schema for Tasks endpoints (FastAPI auto-generates the full schema)."

servers:
  - url: "https://adnan-backend-v4.onrender.com"
    description: "Production server"

paths:
  /tasks/all:
    get:
      summary: Get all tasks
      tags: [Tasks]
      responses:
        "200":
          description: All tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResponse"

  /tasks/create:
    post:
      summary: Create a task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "200":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /tasks/batch:
    post:
      summary: Create multiple tasks
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TaskCreate"
      responses:
        "200":
          description: Batch created tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskResponse"

  /tasks/{task_id}:
    patch:
      summary: Update a task
      tags: [Tasks]
      parameters:
        - in: path
          name: task_id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

    delete:
      summary: Delete a task
      tags: [Tasks]
      parameters:
        - in: path
          name: task_id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Deleted task

components:
  schemas:

    TaskCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        priority:
          type: string
          nullable: true
        goal:
          type: array
          items:
            type: string

    TaskUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date
          nullable: true

    TaskResponse:
      type: object
      properties:
        id:
          type: string
        notion_id:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date
          nullable: true
        goal:
          type: array
          items:
            type: string

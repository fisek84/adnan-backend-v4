openapi: "3.0.3"

info:
  title: "Evolia Backend v4"
  version: "4.2"
  description: "GPT-compatible API for Evolia Backend v4 — goals, tasks, sync, AI commands, AI Ops, and Notion Ops."

servers:
  - url: "https://adnan-backend-v4.onrender.com"
    description: "Production server"

paths:

  ############################################################
  # GOALS
  ############################################################
  /goals/all:
    get:
      summary: "Get all goals"
      tags: [Goals]
      operationId: "getAllGoals"
      responses:
        "200":
          description: "Goals list"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalResponse"

  /goals/create:
    post:
      summary: "Create a goal"
      tags: [Goals]
      operationId: "createGoal"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalCreate"
      responses:
        "200":
          description: "Goal created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalResponse"

  /goals/{goal_id}:
    patch:
      summary: "Update a goal"
      tags: [Goals]
      operationId: "updateGoal"
      parameters:
        - name: "goal_id"
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: "Goal updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalResponse"

    delete:
      summary: "Delete a goal"
      tags: [Goals]
      operationId: "deleteGoal"
      parameters:
        - name: "goal_id"
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Goal deleted"


  ############################################################
  # TASKS
  ############################################################
  /tasks/all:
    get:
      summary: "Get all tasks"
      tags: [Tasks]
      operationId: "getAllTasks"
      responses:
        "200":
          description: "Tasks list"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResponse"

  /tasks/create:
    post:
      summary: "Create a task"
      tags: [Tasks]
      operationId: "createTask"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "200":
          description: "Task created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /tasks/{task_id}:
    patch:
      summary: "Update a task"
      tags: [Tasks]
      operationId: "updateTask"
      parameters:
        - name: "task_id"
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: "Task updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

    delete:
      summary: "Delete a task"
      tags: [Tasks]
      operationId: "deleteTask"
      parameters:
        - name: "task_id"
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Task deleted"


  ############################################################
  # SYNC
  ############################################################
  /sync/goals:
    post:
      summary: "Sync goals"
      tags: [Sync]
      operationId: "syncGoals"
      responses:
        "200":
          description: "Sync complete"

  /sync/tasks:
    post:
      summary: "Sync tasks"
      tags: [Sync]
      operationId: "syncTasks"
      responses:
        "200":
          description: "Sync complete"

  /sync/full:
    post:
      summary: "Full sync (goals + tasks)"
      tags: [Sync]
      operationId: "syncFull"
      responses:
        "200":
          description: "Full sync complete"


  ############################################################
  # AI COMMANDS
  ############################################################
  /ai/run:
    post:
      summary: "Run AI command"
      tags: [AI]
      operationId: "runAiCommand"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIRequest"
      responses:
        "200":
          description: "AI command executed"

  /ai/commands:
    get:
      summary: "List AI commands"
      tags: [AI]
      operationId: "listAiCommands"
      responses:
        "200":
          description: "Command list"


  ############################################################
  # AGENTS
  ############################################################
  /agents/run:
    post:
      summary: "Run agent action"
      tags: [Agents]
      operationId: "runAgent"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRequest"
      responses:
        "200":
          description: "Agent executed"

  /agents/actions:
    get:
      summary: "List agent actions"
      tags: [Agents]
      operationId: "listAgentActions"
      responses:
        "200":
          description: "Agent actions list"


  ############################################################
  # AI OPS — NATURAL LANGUAGE
  ############################################################
  /ai-ops/run:
    post:
      summary: "Run natural language Notion Ops command"
      tags: [AI Ops]
      operationId: "runAiOpsNaturalLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: "AI Ops result"


  ############################################################
  # NOTION OPS — STRUCTURED
  ############################################################
  /ext/notion-ops/execute:
    post:
      summary: "Execute structured Notion Ops command"
      tags: [Notion Ops]
      operationId: "notionOpsExecute"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                payload:
                  type: object
      responses:
        "200":
          description: "Structured Notion Ops result"

  /ext/notion-ops/structure-check:
    post:
      summary: "Validate structure of Notion DB"
      tags: [Notion Ops]
      operationId: "notionOpsStructureCheck"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [db_key, expected_properties]
              properties:
                db_key:
                  type: string
                expected_properties:
                  type: object
      responses:
        "200":
          description: "Structure check result"


############################################################
# COMPONENTS
############################################################
components:
  schemas:

    GoalResponse:
      type: object
      properties:
        id: {type: string}
        title: {type: string}
        description: {type: string, nullable: true}
        deadline: {type: string, nullable: true}
        parent_id: {type: string, nullable: true}
        priority: {type: string, nullable: true}
        status: {type: string}
        progress: {type: integer}
        children:
          type: array
          items: {type: string}

    GoalCreate:
      type: object
      required: [title]
      properties:
        title: {type: string}
        description: {type: string, nullable: true}
        deadline: {type: string, nullable: true}
        parent_id: {type: string, nullable: true}
        priority: {type: string, nullable: true}

    GoalUpdate:
      type: object
      properties:
        title: {type: string, nullable: true}
        description: {type: string, nullable: true}
        deadline: {type: string, nullable: true}
        parent_id: {type: string, nullable: true}
        priority: {type: string, nullable: true}
        status: {type: string, nullable: true}
        progress: {type: integer, nullable: true}

    TaskResponse:
      type: object
      properties:
        id: {type: string}
        title: {type: string}
        description: {type: string, nullable: true}
        goal_id: {type: string, nullable: true}
        deadline: {type: string, nullable: true}
        priority: {type: string, nullable: true}
        status: {type: string}
        order: {type: integer}

    TaskCreate:
      type: object
      required: [title]
      properties:
        title: {type: string}
        description: {type: string, nullable: true}
        deadline: {type: string, nullable: true}
        goal_id: {type: string, nullable: true}
        priority: {type: string, nullable: true}

    TaskUpdate:
      type: object
      properties:
        title: {type: string, nullable: true}
        description: {type: string, nullable: true}
        deadline: {type: string, nullable: true}
        goal_id: {type: string, nullable: true}
        priority: {type: string, nullable: true}
        status: {type: string, nullable: true}
        order: {type: integer, nullable: true}

    AIRequest:
      type: object
      required: [command]
      properties:
        command: {type: string}
        payload: {type: object, nullable: true}

    AgentRequest:
      type: object
      required: [action]
      properties:
        action: {type: string}
        payload: {type: object, nullable: true}
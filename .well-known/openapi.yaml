openapi: 3.1.0
info:
  title: Evolia Notion Ops Agent API (GPT Compatible)
  version: "4.0"
servers:
  - url: https://adnan-backend-v4.onrender.com

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:

    GoalModel:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        deadline: { type: string, nullable: true }
        parent_id: { type: string, nullable: true }
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]
        progress:
          type: number
        children:
          type: array
          items: { type: string }
        created_at: { type: string }
        updated_at: { type: string }

    TaskModel:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        goal_id: { type: string, nullable: true }
        deadline: { type: string, nullable: true }
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]
        created_at: { type: string }
        updated_at: { type: string }

    AgentMessage:
      type: object
      properties:
        agent: { type: string }
        content: { type: string }

    AgentProject:
      type: object
      properties:
        agent: { type: string }
        title: { type: string }
        description: { type: string }

    AgentStateUpdate:
      type: object
      properties:
        agent: { type: string }
        state: { type: string }

paths:

  /goals/all:
    get:
      operationId: getAllGoals
      summary: Get all goals
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalModel"

  /goals/create:
    post:
      operationId: createGoal
      summary: Create a new goal
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalModel"
      responses:
        "200":
          description: Created goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalModel"

  /goals/{goal_id}:
    get:
      operationId: getGoal
      summary: Get goal by ID
      security:
        - ApiKeyAuth: []
      parameters:
        - name: goal_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalModel"

    put:
      operationId: updateGoal
      summary: Update a goal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: goal_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalModel"
      responses:
        "200":
          description: Updated goal

    delete:
      operationId: deleteGoal
      summary: Delete a goal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: goal_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted goal

  /tasks/all:
    get:
      operationId: getAllTasks
      summary: Get all tasks
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: All tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskModel"

  /tasks/create:
    post:
      operationId: createTask
      summary: Create a new task
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskModel"
      responses:
        "200":
          description: Created task

  /tasks/{task_id}:
    get:
      operationId: getTask
      summary: Get task by ID
      security:
        - ApiKeyAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskModel"

    put:
      operationId: updateTask
      summary: Update a task
      security:
        - ApiKeyAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskModel"
      responses:
        "200":
          description: Updated task

    delete:
      operationId: deleteTask
      summary: Delete a task
      security:
        - ApiKeyAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted task

  /sync/goals:
    post:
      operationId: syncGoals
      summary: Sync goals with Notion
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Sync result

  /sync/tasks:
    post:
      operationId: syncTasks
      summary: Sync tasks with Notion
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Sync result

  /agents/message:
    post:
      operationId: sendAgentMessage
      summary: Send agent message
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMessage"
      responses:
        "200":
          description: Message stored

  /agents/messages:
    get:
      operationId: getAgentMessages
      summary: Get agent messages
      security:
        - ApiKeyAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of messages

  /agents/project:
    post:
      operationId: createAgentProject
      summary: Create agent project
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentProject"
      responses:
        "200":
          description: Project created

  /agents/state:
    post:
      operationId: updateAgentState
      summary: Update agent internal state
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentStateUpdate"
      responses:
        "200":
          description: State updated